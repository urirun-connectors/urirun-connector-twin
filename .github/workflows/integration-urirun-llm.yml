name: integration-urirun-llm

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: integration-urirun-llm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  connector-through-urirun-and-llm-runtime:
    name: Connector -> urirun -> urirun-llm-runtime
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout urirun-connector-twin
        uses: actions/checkout@v4
        with:
          path: urirun-connector-twin

      - name: Checkout urirun
        uses: actions/checkout@v4
        with:
          repository: if-uri/urirun
          path: _deps/urirun

      - name: Checkout urirun-llm-runtime
        uses: actions/checkout@v4
        with:
          repository: if-uri/urirun-llm-runtime
          path: _deps/urirun-llm-runtime

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install urirun, current connector and llm runtime from source
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./_deps/urirun/adapters/python"
          python -m pip install -e "./urirun-connector-twin[test]"
          python -m pip install -e "./_deps/urirun-llm-runtime[dev]"

      - name: Verify connector package imports
        working-directory: urirun-connector-twin
        run: |
          python - <<'PY'
          from urirun_connector_twin.core import urirun_bindings
          bindings = urirun_bindings()
          assert "twin://host/doctor/query/report" in bindings["bindings"]
          print("Connector import and doctor bindings OK")
          PY

      - name: Build isolated registry
        run: |
          mkdir -p .urirun
          python - <<'PY'
          import json
          from pathlib import Path
          from urirun_connector_twin.core import urirun_bindings
          bindings = urirun_bindings()
          out = Path(".urirun/twin.bindings.v2.json")
          out.write_text(json.dumps(bindings, indent=2, sort_keys=True), encoding="utf-8")
          assert "twin://host/doctor/query/report" in json.dumps(bindings), "safe doctor route missing"
          print("Wrote isolated bindings:", out)
          PY
          urirun compile .urirun/twin.bindings.v2.json --out .urirun/twin.registry.json
          test -s .urirun/twin.registry.json

      - name: Assert registry contains current connector only
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          registry = json.loads(Path(".urirun/twin.registry.json").read_text(encoding="utf-8"))
          text = json.dumps(registry)
          assert "twin://host/doctor/query/report" in text, "safe doctor route missing from registry"
          for marker in ['kvm://', 'fs://', 'pdf://', 'browser://', 'http-check://', 'httpcheck://', 'router://', 'mqtt://', 'github://', 'ocr://', 'camera://', 'usb://', 'adb://', 'node://', 'email://', 'calendar://', 'doc://', 'docid://', 'document://', 'flow://', 'invoice://', 'koru://', 'ksef://', 'linkedin://', 'llm://', 'dns://', 'netscan://', 'task://', 'sheet://', 'smartcrop://', 'data://', 'artifact://', 'check://', 'log://', 'time://', 'urifix://', 'urivision://', 'runtime://', 'vdisplay://', 'view://', 'vql://', 'webnode://', 'youtube://', 'agent://', 'connector://', 'adopt://', 'monitor://', 'device://', 'webcam://']:
              assert marker not in text, f"Unexpected non-current connector route found: {marker}"
          print("Registry isolation OK: only current connector routes are present.")
          PY

      - name: Run route directly through urirun
        run: |
          urirun run 'twin://host/doctor/query/report' .urirun/twin.registry.json --execute --allow 'twin://**' | tee run-response.json
          python - <<'PY'
          import json
          from pathlib import Path
          response = json.loads(Path("run-response.json").read_text(encoding="utf-8"))
          result = response.get("result")
          value = result.get("value", result) if isinstance(result, dict) else result
          assert response.get("ok") is True, response
          assert isinstance(value, dict), response
          assert value.get("ok") is True, response
          assert value.get("status") == "ready", response
          print("Doctor route through urirun run OK")
          PY

      - name: Start urirun node
        run: |
          nohup urirun node serve --execute --host 127.0.0.1 --port 18765 --registry .urirun/twin.registry.json --allow 'twin://**' > urirun-node.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18765/health; then
              echo "urirun node is healthy"
              break
            fi
            sleep 2
          done
          curl -sf http://127.0.0.1:18765/health
          curl -sf http://127.0.0.1:18765/routes | tee routes.json
          grep -q 'twin://host/doctor/query/report' routes.json

      - name: POST /run smoke test
        run: |
          curl -sf -X POST http://127.0.0.1:18765/run -H 'Content-Type: application/json' -d '{"uri":"twin://host/doctor/query/report","mode":"execute","payload":{}}' | tee node-run-response.json
          python - <<'PY'
          import json
          from pathlib import Path
          response = json.loads(Path("node-run-response.json").read_text(encoding="utf-8"))
          result = response.get("result")
          value = result.get("value", result) if isinstance(result, dict) else result
          assert response.get("ok") is True, response
          assert isinstance(value, dict), response
          assert value.get("ok") is True, response
          assert value.get("status") == "ready", response
          print("/run doctor route OK")
          PY

      - name: LLM runtime Executor smoke test
        working-directory: urirun-connector-twin
        env:
          URIRUN_NODE_URL: http://127.0.0.1:18765
        run: |
          python scripts/ci_urirun_llm_smoke.py

      - name: Dump urirun node log on failure
        if: failure()
        run: |
          echo "===== urirun-node.log ====="
          cat urirun-node.log || true
